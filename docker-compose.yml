version: '3.8'

services:
  9router:
    image: decolua/9router:latest
    container_name: 9router
    ports:
      - "20128:20128"
    volumes:
      - 9router-data:/app/data
    restart: unless-stopped

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    volumes:
      - hermes-data:/opt/data
    restart: unless-stopped
    depends_on:
      - 9router

volumes:
  9router-data:
  hermes-data:
